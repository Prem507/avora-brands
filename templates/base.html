<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>{% block title %}Avora Brands{% endblock %}</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@600;700&family=DM+Sans:wght@300;400;500&display=swap" rel="stylesheet">
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --black: #0a0a0a;
      --white: #fafaf8;
      --gold: #c9a84c;
      --gold-light: #e8c97a;
      --grey: #6b6b6b;
      --light-grey: #f0efe9;
      --border: #e0ddd5;
    }

    body {
      font-family: 'DM Sans', sans-serif;
      background: var(--white);
      color: var(--black);
      min-height: 100vh;
    }

    /* NAV */
    nav {
      display: flex;
      justify-content: space-between;
      align-items: center;
      padding: 1.4rem 3rem;
      border-bottom: 1px solid var(--border);
      background: var(--white);
      position: sticky;
      top: 0;
      z-index: 100;
    }
    .logo {
      font-family: 'Playfair Display', serif;
      font-size: 1.5rem;
      color: var(--black);
      text-decoration: none;
      letter-spacing: 0.03em;
    }
    .logo span { color: var(--gold); }
    nav ul { list-style: none; display: flex; gap: 2.5rem; }
    nav a {
      text-decoration: none;
      color: var(--grey);
      font-size: 0.9rem;
      font-weight: 500;
      letter-spacing: 0.05em;
      text-transform: uppercase;
      transition: color 0.2s;
    }
    nav a:hover, nav a.active { color: var(--black); }
    nav a.active { border-bottom: 2px solid var(--gold); padding-bottom: 2px; }

    /* HERO STRIP */
    .page-hero {
      background: var(--black);
      color: var(--white);
      padding: 4rem 3rem 3.5rem;
      text-align: center;
    }
    .page-hero h1 {
      font-family: 'Playfair Display', serif;
      font-size: clamp(2.2rem, 5vw, 3.5rem);
      font-weight: 700;
      letter-spacing: 0.02em;
    }
    .page-hero h1 span { color: var(--gold); }
    .page-hero p {
      margin-top: 0.8rem;
      color: #aaa;
      font-size: 1rem;
      font-weight: 300;
      letter-spacing: 0.03em;
    }

    /* MAIN */
    main { max-width: 900px; margin: 0 auto; padding: 3rem 1.5rem 5rem; }

    /* FORM */
    .form-card {
      background: #fff;
      border: 1px solid var(--border);
      border-radius: 12px;
      padding: 2.5rem 2.5rem;
      box-shadow: 0 4px 30px rgba(0,0,0,0.05);
    }
    .form-row { display: grid; grid-template-columns: 1fr 1fr; gap: 1.2rem; }
    @media (max-width: 600px) { .form-row { grid-template-columns: 1fr; } nav { padding: 1rem 1.5rem; } nav ul { gap: 1.2rem; } main { padding: 2rem 1rem 4rem; } .form-card { padding: 1.5rem; } .page-hero { padding: 3rem 1.5rem; } }

    .form-group { display: flex; flex-direction: column; gap: 0.45rem; margin-bottom: 1.2rem; }
    label { font-size: 0.8rem; font-weight: 500; text-transform: uppercase; letter-spacing: 0.08em; color: var(--grey); }
    input, textarea, select {
      width: 100%;
      padding: 0.75rem 1rem;
      border: 1.5px solid var(--border);
      border-radius: 8px;
      font-family: 'DM Sans', sans-serif;
      font-size: 0.95rem;
      background: var(--light-grey);
      color: var(--black);
      transition: border-color 0.2s, background 0.2s;
      outline: none;
    }
    input:focus, textarea:focus, select:focus {
      border-color: var(--gold);
      background: #fff;
    }
    input.error, textarea.error { border-color: #d63838; }
    .field-error { color: #d63838; font-size: 0.78rem; margin-top: 0.2rem; }
    textarea { resize: vertical; min-height: 130px; }

    /* BUTTON */
    .btn {
      display: inline-flex;
      align-items: center;
      gap: 0.5rem;
      padding: 0.85rem 2.2rem;
      background: var(--black);
      color: var(--white);
      font-family: 'DM Sans', sans-serif;
      font-size: 0.9rem;
      font-weight: 500;
      letter-spacing: 0.06em;
      text-transform: uppercase;
      border: none;
      border-radius: 8px;
      cursor: pointer;
      transition: background 0.2s, transform 0.15s;
    }
    .btn:hover { background: var(--gold); transform: translateY(-1px); }
    .btn:active { transform: translateY(0); }
    .btn:disabled { opacity: 0.6; cursor: not-allowed; transform: none; }

    /* TOAST */
    .toast {
      position: fixed;
      bottom: 2rem;
      right: 2rem;
      padding: 1rem 1.5rem;
      border-radius: 10px;
      font-size: 0.9rem;
      font-weight: 500;
      color: #fff;
      z-index: 999;
      opacity: 0;
      transform: translateY(10px);
      transition: opacity 0.3s, transform 0.3s;
      max-width: 340px;
    }
    .toast.show { opacity: 1; transform: translateY(0); }
    .toast.success { background: #1a7a4a; }
    .toast.error { background: #b83232; }

    /* FOOTER */
    footer {
      text-align: center;
      padding: 1.5rem;
      border-top: 1px solid var(--border);
      color: var(--grey);
      font-size: 0.8rem;
      letter-spacing: 0.03em;
    }
  </style>
</head>
<body>

<nav>
  <a class="logo" href="/contact">Avora <span>Brands</span></a>
  <ul>
    <li><a href="/contact" {% if request.path == '/contact' or request.path == '/' %}class="active"{% endif %}>Contact</a></li>
    <li><a href="/careers" {% if request.path == '/careers' %}class="active"{% endif %}>Careers</a></li>
  </ul>
</nav>

{% block content %}{% endblock %}

<div class="toast" id="toast"></div>

<footer>© 2025 Avora Brands. All rights reserved.</footer>

<script>
function showToast(msg, type = "success") {
  const t = document.getElementById("toast");
  t.textContent = msg;
  t.className = `toast ${type} show`;
  setTimeout(() => { t.className = "toast"; }, 4000);
}
</script>
{% block scripts %}{% endblock %}
</body>
</html>
